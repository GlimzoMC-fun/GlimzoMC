<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlimzoMC — Log In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --g:#4ade80; --gd:#16a34a; --bg:#050d08; --bgc:#0a1a0f;
      --bge:#0f2318; --w:#f0fdf4; --gr:#86efac;
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      background:var(--bg); color:var(--w);
      font-family:'Barlow',sans-serif; min-height:100vh;
      display:flex; flex-direction:column;
    }

    /* ── HERO BG ── */
    .page-bg{
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(22,163,74,.13) 0%, transparent 60%),
        var(--bg);
    }
    .page-grid{
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(74,222,128,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,222,128,.03) 1px, transparent 1px);
      background-size:60px 60px;
    }

    /* ── NAV ── */
    nav{
      position:relative; z-index:10;
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 48px;
      background:rgba(5,13,8,.92); backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(74,222,128,.1);
    }
    .nav-logo{
      font-family:'Bebas Neue',sans-serif; font-size:26px;
      letter-spacing:3px; color:var(--g); text-decoration:none;
      text-shadow:0 0 20px rgba(74,222,128,.4);
    }
    .nav-links{ display:flex; gap:28px; list-style:none; }
    .nav-links a{
      color:var(--gr); font-size:13px; font-weight:600;
      letter-spacing:1.5px; text-transform:uppercase;
      text-decoration:none; opacity:.7; transition:opacity .2s;
    }
    .nav-links a:hover{ opacity:1; color:var(--g); }

    /* ── MAIN WRAPPER ── */
    .auth-wrap{
      position:relative; z-index:1;
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:60px 24px;
    }

    /* ── FORM CONTAINER (Hypixel style) ── */
    .auth-box{
      width:100%; max-width:680px;
    }
    .auth-page-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(36px,5vw,56px); letter-spacing:3px;
      color:var(--w); margin-bottom:24px;
    }
    .auth-page-title span{ color:var(--g); }

    /* Outer border frame (Hypixel corner style using CSS) */
    .auth-frame{
      background:rgba(5,13,8,.95);
      border:1px solid rgba(74,222,128,.25);
      border-radius:4px;
      position:relative;
      box-shadow:0 0 0 1px rgba(74,222,128,.08), 0 20px 60px rgba(0,0,0,.6);
    }
    /* Corner accents */
    .auth-frame::before, .auth-frame::after{
      content:''; position:absolute;
      width:12px; height:12px;
      border-color:var(--g); border-style:solid;
    }
    .auth-frame::before{ top:-2px; left:-2px; border-width:2px 0 0 2px; }
    .auth-frame::after{ bottom:-2px; right:-2px; border-width:0 2px 2px 0; }

    /* Inner form rows */
    .auth-rows{
      background:rgba(0,0,0,.35);
      border-bottom:1px solid rgba(74,222,128,.1);
    }
    .auth-row{
      display:grid; grid-template-columns:220px 1fr;
      border-bottom:1px solid rgba(74,222,128,.06);
    }
    .auth-row:last-child{ border-bottom:none; }
    .auth-row-label{
      padding:22px 24px; text-align:right;
      font-size:14px; font-weight:600; color:var(--gr); opacity:.8;
      display:flex; flex-direction:column; align-items:flex-end;
      justify-content:center; gap:4px;
      background:rgba(0,0,0,.2);
      border-right:1px solid rgba(74,222,128,.08);
    }
    .auth-row-label span{
      font-size:11px; font-weight:500; opacity:.45; letter-spacing:.5px;
    }
    .auth-row-input{
      padding:18px 20px;
      display:flex; flex-direction:column; gap:8px;
    }
    .auth-input{
      width:100%; background:rgba(0,0,0,.5);
      border:1px solid rgba(74,222,128,.15); border-radius:4px;
      padding:11px 14px; color:var(--w);
      font-family:'Barlow',sans-serif; font-size:14px; outline:none;
      transition:border-color .2s;
    }
    .auth-input:focus{ border-color:var(--g); box-shadow:0 0 0 2px rgba(74,222,128,.08); }
    .auth-input::placeholder{ color:rgba(134,239,172,.25); }
    .pw-wrap{ position:relative; }
    .pw-wrap .auth-input{ padding-right:72px; }
    .pw-show{
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:1px solid rgba(74,222,128,.2);
      border-radius:3px; color:var(--gr); font-size:11px; font-weight:700;
      letter-spacing:1px; padding:4px 9px; cursor:pointer;
      transition:all .2s;
    }
    .pw-show:hover{ border-color:var(--g); color:var(--g); }
    .auth-hint{
      font-size:12px; color:var(--gr); opacity:.5;
    }
    .auth-link{
      font-size:13px; color:var(--g); text-decoration:none;
      font-weight:600; opacity:.8; transition:opacity .2s;
    }
    .auth-link:hover{ opacity:1; }
    .auth-checkbox-row{
      display:flex; align-items:center; gap:10px;
      font-size:13px; color:var(--gr); opacity:.7;
    }
    .auth-checkbox{
      width:16px; height:16px; accent-color:var(--g); cursor:pointer;
    }

    /* Bottom bar */
    .auth-bottom{
      padding:20px 24px;
      display:flex; align-items:center; gap:20px; flex-wrap:wrap;
    }
    .btn-auth-submit{
      background:var(--g); color:#050d08; border:none;
      padding:12px 36px; border-radius:5px;
      font-family:'Barlow',sans-serif; font-weight:800; font-size:14px;
      letter-spacing:1px; text-transform:uppercase; cursor:pointer;
      transition:all .2s; display:inline-flex; align-items:center; gap:8px;
      box-shadow:0 4px 20px rgba(74,222,128,.3);
    }
    .btn-auth-submit:hover{ opacity:.88; transform:translateY(-1px); box-shadow:0 6px 28px rgba(74,222,128,.4); }

    .auth-alt{
      font-size:13px; color:var(--gr); opacity:.6;
      display:flex; align-items:center; gap:10px;
    }
    .btn-auth-ghost{
      background:rgba(74,222,128,.07); color:var(--gr);
      border:1px solid rgba(74,222,128,.2); padding:9px 20px;
      border-radius:5px; font-family:'Barlow',sans-serif;
      font-weight:700; font-size:13px; letter-spacing:.5px;
      cursor:pointer; transition:all .2s; text-decoration:none;
      display:inline-block;
    }
    .btn-auth-ghost:hover{ border-color:var(--g); color:var(--g); }

    .auth-or{
      width:100%; text-align:center; font-size:15px;
      color:var(--gr); opacity:.4; padding:14px 0;
      border-top:1px solid rgba(74,222,128,.07);
      letter-spacing:2px;
    }

    /* Error message */
    .auth-error{
      display:none; padding:12px 20px; margin:0 20px 0;
      background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.25);
      border-radius:5px; color:#fca5a5; font-size:13px; font-weight:600;
    }
    .auth-error.show{ display:block; }

    /* Breadcrumb */
    .auth-breadcrumb{
      padding:16px 0; font-size:13px;
      color:var(--gr); opacity:.4;
    }
    .auth-breadcrumb a{ color:var(--g); text-decoration:none; opacity:.8; }

    /* Corner decorations (all 4) */
    .corner{ position:absolute; width:10px; height:10px; }
    .corner.tl{ top:-1px; left:-1px; border-top:2px solid var(--g); border-left:2px solid var(--g); }
    .corner.tr{ top:-1px; right:-1px; border-top:2px solid var(--g); border-right:2px solid var(--g); }
    .corner.bl{ bottom:-1px; left:-1px; border-bottom:2px solid var(--g); border-left:2px solid var(--g); }
    .corner.br{ bottom:-1px; right:-1px; border-bottom:2px solid var(--g); border-right:2px solid var(--g); }

    @media(max-width:600px){
      nav{ padding:14px 20px; }
      .nav-links{ display:none; }
      .auth-row{ grid-template-columns:1fr; }
      .auth-row-label{ text-align:left; border-right:none; border-bottom:1px solid rgba(74,222,128,.06); padding:14px 20px 8px; }
    }
  </style>
</head>
<body>

<div class="page-bg"></div>
<div class="page-grid"></div>

<nav>
  <a class="nav-logo" href="index.html">GlimzoMC</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#gamemodes">Gamemodes</a></li>
    <li><a href="index.html#community">Community Portal</a></li>
  </ul>
</nav>

<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-page-title">Log <span>In</span></div>

    <div class="auth-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="auth-rows">

        <!-- Username -->
        <div class="auth-row">
          <div class="auth-row-label">Your username:</div>
          <div class="auth-row-input">
            <input type="text" class="auth-input" id="login-username" placeholder="YourUsername" autocomplete="username" />
          </div>
        </div>

        <!-- Password -->
        <div class="auth-row">
          <div class="auth-row-label">Password:</div>
          <div class="auth-row-input">
            <div class="pw-wrap">
              <input type="password" class="auth-input" id="login-pw" placeholder="••••••••" autocomplete="current-password" />
              <button class="pw-show" onclick="togglePw('login-pw', this)">Show</button>
            </div>
            <div class="auth-checkbox-row" style="margin-top:4px;">
              <input type="checkbox" class="auth-checkbox" id="stay-logged" checked />
              <label for="stay-logged">Stay logged in</label>
            </div>
          </div>
        </div>

      </div><!-- /auth-rows -->

      <div class="auth-error" id="login-error"></div>

      <div class="auth-bottom">
        <button class="btn-auth-submit" onclick="doLogin()">🔒 Log In</button>
        <div class="auth-alt">
          Don't have an account?
          <a class="btn-auth-ghost" href="register.html">Register now</a>
        </div>
      </div>

    </div><!-- /auth-frame -->

    <div class="auth-breadcrumb"><a href="index.html">Home</a> › Log In</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bglgsikoblveeofpdyuv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnbGdzaWtvYmx2ZWVvZnBkeXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNzAyNDEsImV4cCI6MjA5Mjc0NjI0MX0.9WdcO6cvrbQ93TIGcgDOR6MU5VKD6zovEkYd-aNWYAA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.classList.add('show');
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!username) return showError('Please enter your username.');
  if (!pw) return showError('Please enter your password.');

  // Look up profile to confirm username exists
  const { data: profile } = await sb.from('profiles').select('id').eq('username', username).single();
  if (!profile) return showError('Username not found. Check your spelling or register a new account.');

  const fakeEmail = `${username.toLowerCase()}@glimzomc.local`;
  const { error } = await sb.auth.signInWithPassword({ email: fakeEmail, password: pw });
  if (error) return showError('Incorrect password. Please try again.');

  // Redirect back to home
  window.location.href = 'index.html';
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// If already logged in, redirect
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'index.html';
});
</script>
</body>
</html>
